version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

 kafka:
  image: confluentinc/cp-kafka:7.4.0
  depends_on:
    - zookeeper
  ports:
    - "9092:9092"
  environment:
    KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  api-gateway:
    build: ./services/api-gateway/ApiGateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - kafka
      - rabbitmq

  user-service:
    build: ./services/user-service/UserService
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - postgres

  test-service:
    build: ./services/test-service/TestService
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      - postgres
      - kafka

  statistics-service:
    build: ./services/statistics-service/StatisticsService
    ports:
      - "8083:8083"
    env_file:
      - .env
    depends_on:
      - postgres
      - kafka
      - rabbitmq

  learning-service:
    build: ./services/learning-service/LearningPlanService
    ports:
      - "8084:8084"
    env_file:
      - .env
    depends_on:
      - postgres
      - kafka
      - rabbitmq

  notification-service:
    build: ./services/notification-service/NotificationService
    ports:
      - "8085:8085"
    env_file:
      - .env
    depends_on:
      - postgres
      - rabbitmq

  payment-service:
    build: ./services/payment-service/PaymentService
    ports:
      - "8087:8087"
    env_file:
      - .env
    depends_on:
      - postgres

  permission-service:
    build: ./services/permission-service/PermissionService
    ports:
      - "8086:8086"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data: